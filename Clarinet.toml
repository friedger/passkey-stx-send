[project]
name = 'passkey-stx-send'
description = 'On-chain WebAuthn (passkey) verification for NOT token transfers'
authors = []
telemetry = false
cache_dir = './.cache'

# passkey-not-sender calls into three mainnet contracts: the "nope" (NOT)
# SIP-010 token, BNS-V2 to resolve recipient names, and clarity-5-webauthn-v3
# for the on-chain WebAuthn (P-256) assertion check. Declaring them as requirements
# makes `clarinet check` pull and analyse against the real deployed contracts.
# The first run needs network access.
[[project.requirements]]
contract_id = 'SP32AEEF6WW5Y0NMJ1S8SBSZDAY8R5J32NBZFPKKZ.nope'

[[project.requirements]]
contract_id = 'SP2QEZ06AGJ3RKJPBV14SY1V5BBFNAW33D96YPGZF.BNS-V2'

[[project.requirements]]
contract_id = 'SPV9K21TBFAK4KNRJXF5DFP8N7W46G4V9RCJDC22.clarity-5-webauthn-v3'

[contracts.passkey-not-sender]
path = 'contracts/passkey-not-sender.clar'
# Clarity 5 provides the native `secp256r1-verify` used to check the passkey
# (P-256) signature on-chain.
clarity_version = 5
epoch = "3.4"
